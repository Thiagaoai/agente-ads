name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FASE-5/CÓDIGO_FASE_5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FASE-5/CÓDIGO_FASE_5/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run smoke tests
        env:
          OPENAI_API_KEY: sk-ci-stub
          SUPABASE_URL: https://ci.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-stub
          SUPABASE_ANON_KEY: ci-stub
          META_ACCESS_TOKEN: ci-stub
          META_AD_ACCOUNT_ID: act_ci
          TELEGRAM_BOT_TOKEN: ""
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: FASE-5/CÓDIGO_FASE_5
        run: docker build -t marketing-squad:ci-${{ github.sha }} .

      - name: Smoke-test container
        run: |
          docker run --rm -d --name squad-test \
            -e OPENAI_API_KEY=stub \
            -e SUPABASE_URL=https://ci.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=stub \
            -e SUPABASE_ANON_KEY=stub \
            -e META_ACCESS_TOKEN=stub \
            -e META_AD_ACCOUNT_ID=act_ci \
            -p 3200:3200 \
            marketing-squad:ci-${{ github.sha }} || true
          sleep 8
          curl -fsS http://localhost:3200/health || (docker logs squad-test; exit 1)
          docker stop squad-test
